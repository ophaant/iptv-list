name: Update IPTV Playlist

on:
  schedule:
    # Run every day at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger from the GitHub Actions tab

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IPTV Updater script
        run: npm run update

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to playlist.m3u
          if git status --porcelain | grep -q "playlist.m3u"; then
            echo "Changes detected in playlist.m3u, committing..."
            git add playlist.m3u
            git commit -m "Auto-update playlist: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          else
            echo "No changes in playlist.m3u, skipping commit."
          fi
